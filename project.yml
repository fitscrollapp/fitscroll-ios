name: FitScroll
options:
  bundleIdPrefix: com.huseyinbabal
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios-spm
    from: "5.0.0"

schemes:
  FitScroll:
    build:
      targets:
        FitScroll: all
    run:
      config: Debug

targets:
  FitScroll:
    type: application
    platform: iOS
    sources:
      - path: FitScroll
    dependencies:
      - target: FitScrollShieldConfiguration
      - target: FitScrollShieldAction
      - package: Firebase
        product: FirebaseAnalytics
      - package: Firebase
        product: FirebaseCrashlytics
      - package: RevenueCat
        product: RevenueCat
    settings:
      base:
        INFOPLIST_FILE: FitScroll/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.huseyinbabal.fitscroll
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: false
        DEVELOPMENT_TEAM: MHJ33CJD79
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_ENTITLEMENTS: FitScroll/Resources/FitScroll.entitlements
        SWIFT_EMIT_LOC_STRINGS: "YES"
    info:
      path: FitScroll/Info.plist
      properties:
        CFBundleName: FitScroll
        CFBundleDisplayName: FitScroll
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        CFBundlePackageType: APPL
        CFBundleExecutable: FitScroll
        CFBundleIdentifier: com.huseyinbabal.fitscroll
        CFBundleDevelopmentRegion: en
        CFBundleLocalizations:
          - en
          - tr
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen:
          UIColorName: LaunchBackground
          UIImageName: LaunchLogo
          UIImageRespectsSafeAreaInsets: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: "FitScroll uses your camera to detect body movements and count exercise repetitions. All processing happens on-device and no video is recorded."
        CFBundleURLTypes:
          - CFBundleURLName: com.huseyinbabal.fitscroll
            CFBundleURLSchemes:
              - fitscroll

  FitScrollShieldConfiguration:
    type: app-extension
    platform: iOS
    sources:
      - path: FitScrollShieldConfiguration
        excludes:
          - "*.entitlements"
    settings:
      base:
        INFOPLIST_FILE: FitScrollShieldConfiguration/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.huseyinbabal.fitscroll.ShieldConfiguration
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: MHJ33CJD79
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: FitScrollShieldConfiguration/ShieldConfiguration.entitlements
        GENERATE_INFOPLIST_FILE: false
    info:
      path: FitScrollShieldConfiguration/Info.plist
      properties:
        CFBundleDisplayName: "Shield Configuration"
        CFBundleName: FitScrollShieldConfiguration
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        CFBundlePackageType: XPC!
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        NSExtension:
          NSExtensionAttributes: {}
          NSExtensionPointIdentifier: com.apple.ManagedSettingsUI.shield-configuration-service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShieldConfigurationExtension

  FitScrollShieldAction:
    type: app-extension
    platform: iOS
    sources:
      - path: FitScrollShieldAction
        excludes:
          - "*.entitlements"
    settings:
      base:
        INFOPLIST_FILE: FitScrollShieldAction/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.huseyinbabal.fitscroll.ShieldAction
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: MHJ33CJD79
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: FitScrollShieldAction/ShieldAction.entitlements
        GENERATE_INFOPLIST_FILE: false
    info:
      path: FitScrollShieldAction/Info.plist
      properties:
        CFBundleDisplayName: "Shield Action"
        CFBundleName: FitScrollShieldAction
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        CFBundlePackageType: XPC!
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        NSExtension:
          NSExtensionAttributes: {}
          NSExtensionPointIdentifier: com.apple.ManagedSettingsUI.shield-action-service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShieldActionExtension

  FitScrollTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - FitScrollTests
    dependencies:
      - target: FitScroll
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.huseyinbabal.fitscroll.tests
        GENERATE_INFOPLIST_FILE: true

  FitScrollUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - FitScrollUITests
    dependencies:
      - target: FitScroll
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.huseyinbabal.fitscroll.uitests
        GENERATE_INFOPLIST_FILE: true
